<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game Romantis</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Nunito', sans-serif;
    }
    
    .beach-bg {
      background: linear-gradient(180deg, 
        #87CEEB 0%, 
        #87CEEB 25%,
        #B0E0E6 35%,
        #FFE4B5 50%,
        #DEB887 55%,
        #F4A460 60%,
        #40E0D0 65%,
        #00CED1 75%,
        #20B2AA 100%
      );
      position: relative;
      overflow: hidden;
    }
    
    .beach-bg::before {
      content: '';
      position: absolute;
      top: 5%;
      right: 15%;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #FFD700 30%, #FFA500 70%, transparent 70%);
      border-radius: 50%;
      box-shadow: 0 0 60px 20px rgba(255, 215, 0, 0.4);
      animation: sunGlow 3s ease-in-out infinite;
    }
    
    .beach-bg::after {
      content: '☁️ ☁️ ☁️';
      position: absolute;
      top: 8%;
      left: 10%;
      font-size: 2rem;
      opacity: 0.8;
      animation: cloudMove 20s linear infinite;
    }
    
    @keyframes sunGlow {
      0%, 100% { box-shadow: 0 0 60px 20px rgba(255, 215, 0, 0.4); }
      50% { box-shadow: 0 0 80px 30px rgba(255, 215, 0, 0.6); }
    }
    
    @keyframes cloudMove {
      0% { transform: translateX(-20px); }
      100% { transform: translateX(20px); }
    }
    
    .card {
      perspective: 1000px;
      cursor: pointer;
    }
    
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s;
      transform-style: preserve-3d;
    }
    
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .card-front {
      background: linear-gradient(135deg, #FF69B4 0%, #87CEEB 100%);
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
    }
    
    .card-front::after {
      content: '💝';
      font-size: 1.8rem;
    }
    
    .card-back {
      background: linear-gradient(135deg, #FFB6C1 0%, #ADD8E6 100%);
      transform: rotateY(180deg);
      box-shadow: 0 4px 15px rgba(135, 206, 235, 0.4);
    }
    
    .card.matched .card-back {
      background: linear-gradient(135deg, #98FB98 0%, #90EE90 100%);
      animation: matchPulse 0.5s ease;
    }
    
    @keyframes matchPulse {
      0%, 100% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
    }
    
    .text-shadow {
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.5);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3);
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .floating {
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    
    .typing-text {
      overflow: hidden;
      white-space: pre-wrap;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes celebrate {
      0%, 100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.1) rotate(-5deg); }
      75% { transform: scale(1.1) rotate(5deg); }
    }
    
    .celebrate {
      animation: celebrate 0.5s ease infinite;
    }
    
    @keyframes confetti {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    .confetti {
      position: fixed;
      font-size: 2rem;
      animation: confetti 3s linear forwards;
      pointer-events: none;
      z-index: 100;
    }
    
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    .heart-beat {
      animation: heartBeat 1s ease infinite;
    }
    
    .slide-container {
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    
    .slide-hidden {
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      position: absolute;
    }
    
    .slide-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full beach-bg overflow-auto">
  <div id="app" class="min-h-full w-full flex flex-col items-center justify-center p-4 relative"><!-- Slide 1: Memory Game -->
   <div id="slide1" class="slide-container slide-visible w-full max-w-md mx-auto">
    <div class="glass-card rounded-3xl p-6 mb-6">
     <h1 id="gameTitle" class="text-3xl font-black text-white text-center text-shadow floating mb-2">memory gamee 🫶🏻</h1>
     <p id="gameSubtitle" class="text-lg font-bold text-white text-center text-shadow">Cocokkan Pasangan Emoji" ini yaa mamaahh 😚🫣</p>
    </div>
    <div id="gameBoard" class="grid grid-cols-4 gap-3 mb-6"><!-- Cards will be generated by JavaScript -->
    </div>
    <div id="winMessage" class="hidden glass-card rounded-2xl p-6 text-center">
     <p class="text-2xl font-black text-white text-shadow celebrate">yeeeyy selamat yaaah mamaahh menanggg 😋🫶🏻</p>
     <p class="text-white font-bold mt-3 text-shadow">Tunggu sebentar ya... 💝</p>
    </div>
   </div><!-- Slide 2: Love Message -->
   <div id="slide2" class="slide-container slide-hidden w-full max-w-lg mx-auto">
    <div class="glass-card rounded-3xl p-8">
     <div id="typingContainer" class="text-white font-bold text-xl leading-relaxed text-shadow text-center"><!-- Typing text will appear here -->
     </div>
     <div id="finalHearts" class="hidden text-center mt-6"><span class="text-4xl heart-beat inline-block">💝💖💝</span>
     </div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      game_title: "memory gamee 🫶🏻",
      game_subtitle: "Cocokkan Pasangan Emoji\" ini yaa mamaahh 😚🫣",
      primary_color: "#FF69B4",
      secondary_color: "#87CEEB",
      text_color: "#FFFFFF"
    };
    
    const emojis = ['💖', '😋', '💝', '🥰', '😘', '😆', '🤭', '😍', '💘', '💕', '💋', '🫰🏻'];
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let isLocked = false;
    
    const loveMessage = `Mamaahh Tauu Tidaaa? 💭 —♡દ

hadiaahh terbesar papaah di tahun inii adalaahh....🌷

Keteeemuu mamaaaahh, hihikkk 😚💫💫
makasiii yaaa udaahh hadiirrr di kehidupannnkuu🫶🏻🫰🏻
akuu akaann teteepp samaa mamaahh teruss,
apapun masalahnyaaa kitaa lewatin samaa samaa yaaa!🫵🏻💝🤭

I Love U More Than Anything 💝💖😚🤭😘🫰🏻🫶🏻🌷🌹`;
    
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }
    
    function createGameBoard() {
      const gameBoard = document.getElementById('gameBoard');
      gameBoard.innerHTML = '';
      
      const gameCards = shuffleArray([...emojis, ...emojis]);
      cards = [];
      flippedCards = [];
      matchedPairs = 0;
      isLocked = false;
      
      gameCards.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'card aspect-square';
        card.dataset.index = index;
        card.dataset.emoji = emoji;
        
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front"></div>
            <div class="card-back text-3xl">${emoji}</div>
          </div>
        `;
        
        card.addEventListener('click', () => flipCard(card));
        gameBoard.appendChild(card);
        cards.push(card);
      });
    }
    
    function flipCard(card) {
      if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) {
        return;
      }
      
      card.classList.add('flipped');
      flippedCards.push(card);
      
      if (flippedCards.length === 2) {
        isLocked = true;
        checkMatch();
      }
    }
    
    function checkMatch() {
      const [card1, card2] = flippedCards;
      const match = card1.dataset.emoji === card2.dataset.emoji;
      
      if (match) {
        card1.classList.add('matched');
        card2.classList.add('matched');
        matchedPairs++;
        flippedCards = [];
        isLocked = false;
        
        if (matchedPairs === emojis.length) {
          setTimeout(showWinMessage, 500);
        }
      } else {
        setTimeout(() => {
          card1.classList.remove('flipped');
          card2.classList.remove('flipped');
          flippedCards = [];
          isLocked = false;
        }, 1000);
      }
    }
    
    function showWinMessage() {
      document.getElementById('winMessage').classList.remove('hidden');
      createConfetti();
      
      // Auto transition to slide 2 after 8 seconds
      setTimeout(() => {
        transitionToSlide2();
      }, 8000);
    }
    
    function createConfetti() {
      const confettiEmojis = ['💝', '💖', '💕', '🌸', '✨', '💫', '🎀', '🌷'];
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
          document.body.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 4000);
        }, i * 100);
      }
    }
    
    function transitionToSlide2() {
      const slide1 = document.getElementById('slide1');
      const slide2 = document.getElementById('slide2');
      
      slide1.classList.remove('slide-visible');
      slide1.classList.add('slide-hidden');
      
      setTimeout(() => {
        slide2.classList.remove('slide-hidden');
        slide2.classList.add('slide-visible');
        startTypingAnimation();
      }, 500);
    }
    
    function startTypingAnimation() {
      const container = document.getElementById('typingContainer');
      const finalHearts = document.getElementById('finalHearts');
      container.innerHTML = '';
      
      let charIndex = 0;
      const typingSpeed = 50;
      
      function typeChar() {
        if (charIndex < loveMessage.length) {
          const char = loveMessage[charIndex];
          if (char === '\n') {
            container.innerHTML += '<br>';
          } else {
            container.innerHTML += char;
          }
          charIndex++;
          setTimeout(typeChar, typingSpeed);
        } else {
          finalHearts.classList.remove('hidden');
          createConfetti();
        }
      }
      
      typeChar();
    }
    
    async function onConfigChange(config) {
      const titleEl = document.getElementById('gameTitle');
      const subtitleEl = document.getElementById('gameSubtitle');
      
      if (titleEl) {
        titleEl.textContent = config.game_title || defaultConfig.game_title;
      }
      if (subtitleEl) {
        subtitleEl.textContent = config.game_subtitle || defaultConfig.game_subtitle;
      }
    }
    
    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => {
              config.secondary_color = value;
              window.elementSdk.setConfig({ secondary_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }
    
    function mapToEditPanelValues(config) {
      return new Map([
        ["game_title", config.game_title || defaultConfig.game_title],
        ["game_subtitle", config.game_subtitle || defaultConfig.game_subtitle]
      ]);
    }
    
    // Initialize
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
    
    createGameBoard();
  </script>
